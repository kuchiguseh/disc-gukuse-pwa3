<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DISC別口ぐせ診断</title>
  <meta name="theme-color" content="#e85a8b" />
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── 結果画面：PDFレポート風スタイル ── */
    .report-wrap { max-width: 720px; margin: 0 auto; font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; }

    /* ヘッダーボックス */
    .report-header { background: linear-gradient(135deg, #fff5f0 0%, #fff9f5 100%); border: 1.5px solid #f5c5a3; border-radius: 12px; padding: 16px 20px; margin-bottom: 16px; }
    .report-header .type-label { font-size: 12px; color: #e07040; font-weight: 600; margin-bottom: 4px; }
    .report-header .type-name { font-size: 26px; font-weight: 700; color: #c94a1a; margin-bottom: 6px; }
    .report-header .type-catch { font-size: 14px; color: #555; line-height: 1.6; }
    .report-date { font-size: 12px; color: #999; text-align: right; margin-bottom: 4px; }

    /* セクションタイトル共通 */
    .section-bar { background: #4a7fa5; color: #fff; font-size: 14px; font-weight: 700; padding: 7px 14px; border-radius: 6px; margin: 14px 0 10px; }
    .section-bar.orange { background: #e07040; }
    .section-bar.green  { background: #5a9a6a; }
    .section-bar.purple { background: #8a6ab5; }
    .section-bar.pink   { background: #d4507a; }
    .section-bar.teal   { background: #3a8a8a; }
    .section-bar.gray   { background: #666; }

    /* 回答傾向バー */
    .stats-section { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; }
    .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .stat-row:last-child { margin-bottom: 0; }
    .stat-label { width: 56px; font-size: 13px; font-weight: 600; color: #333; flex-shrink: 0; }
    .stat-bar-wrap { flex: 1; height: 14px; background: #f0f0f0; border-radius: 7px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 7px; transition: width 0.8s ease; }
    .fill-d { background: #e85a5a; }
    .fill-i { background: #f0a030; }
    .fill-s { background: #50b870; }
    .fill-c { background: #4a90d9; }
    .stat-count { width: 32px; font-size: 13px; color: #666; text-align: right; flex-shrink: 0; }

    /* TOP3タグ */
    .top3-wrap { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    .top3-tag { padding: 7px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; }
    .top3-tag.d { background: #fde8e8; color: #c03030; }
    .top3-tag.i { background: #fef0d8; color: #b06010; }
    .top3-tag.s { background: #e8f5ec; color: #2a7a3a; }
    .top3-tag.c { background: #e0eefa; color: #1a60a0; }

    /* 言い換え提案テーブル */
    .rephrase-table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .rephrase-table tr { border-bottom: 1px solid #f0f0f0; }
    .rephrase-table td { padding: 10px 8px; font-size: 14px; vertical-align: middle; }
    .rephrase-bad  { color: #555; width: 38%; }
    .rephrase-arrow { color: #e07040; font-weight: 700; width: 8%; text-align: center; }
    .rephrase-good { color: #1a60a0; font-weight: 600; background: #f0f7ff; border-radius: 6px; padding: 8px 10px !important; width: 54%; }

    /* 自分を整える口ぐせ：3カラム */
    .self-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 8px 0; }
    .self-card { background: #f9f9f9; border-radius: 8px; padding: 12px 10px; text-align: center; font-size: 13px; }
    .self-card .self-main { font-weight: 700; color: #333; line-height: 1.5; margin-bottom: 6px; }
    .self-card .self-ex { color: #888; font-size: 12px; }

    /* 場面別スクリプト */
    .script-row { background: #f9f9f9; border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .script-tag { display: inline-block; background: #4a7fa5; color: #fff; font-size: 12px; font-weight: 700; padding: 2px 10px; border-radius: 4px; margin-bottom: 6px; }
    .script-main { font-size: 14px; color: #222; font-weight: 600; margin-bottom: 4px; }
    .script-ex { font-size: 12px; color: #888; }

    /* 実践メニュー */
    .practice-list { list-style: none; padding: 0; margin: 8px 0; }
    .practice-list li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #333; display: flex; align-items: flex-start; gap: 8px; }
    .practice-list li::before { content: '✓'; color: #e07040; font-weight: 700; flex-shrink: 0; }

    /* DISCとは？ */
    .disc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
    .disc-card { border-radius: 8px; padding: 12px 14px; }
    .disc-card.d { background: #fde8e8; border: 1px solid #f5c0c0; }
    .disc-card.i { background: #fef0d8; border: 1px solid #f5d8a0; }
    .disc-card.s { background: #e8f5ec; border: 1px solid #b0d8b8; }
    .disc-card.c { background: #e0eefa; border: 1px solid #a0c8f0; }
    .disc-card .disc-type { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: #333; }
    .disc-card .disc-sub  { font-size: 12px; color: #666; margin-bottom: 6px; }
    .disc-card .disc-ex   { font-size: 12px; color: #444; line-height: 1.7; }

    /* プロフィール */
    .profile-box { display: flex; gap: 16px; align-items: flex-start; background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 14px 16px; margin: 14px 0; flex-wrap: wrap; }
    .profile-left { flex: 0 0 auto; }
    .profile-left img { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; }
    .profile-right { flex: 1; }
    .profile-name { font-size: 13px; font-weight: 700; color: #e07040; margin-bottom: 4px; }
    .profile-desc { font-size: 13px; color: #444; line-height: 1.7; }
    .seminar-box { flex: 1; min-width: 200px; }
    .seminar-title { font-size: 13px; font-weight: 700; color: #4a7fa5; margin-bottom: 6px; }
    .seminar-desc  { font-size: 13px; color: #444; line-height: 1.7; }
    .apply-btn { display: inline-block; background: #e07040; color: #fff; font-size: 13px; font-weight: 700; padding: 7px 18px; border-radius: 20px; margin-top: 8px; text-decoration: none; }

    /* フッター帯 */
    .report-footer-bar { background: #4a7fa5; color: #fff; text-align: center; font-size: 12px; padding: 10px; border-radius: 0 0 10px 10px; margin-top: 16px; }

    @media (max-width: 500px) {
      .self-grid { grid-template-columns: 1fr; }
      .disc-grid  { grid-template-columns: 1fr; }
      .profile-box { flex-direction: column; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="logo">🌸 DISC別口ぐせ診断</div>
  </header>

  <main>
    <section id="home" class="card">
      <h1>あなたらしさを見つける、やさしい診断</h1>
      <p>10問に答えるだけで、あなたのタイプと"今のあなたに合う言葉"がわかります。</p>
      <button id="start-btn" class="primary">診断をはじめる</button>
      <div id="recent-section" class="recent hidden">
        <h2>最近の結果</h2>
        <ul id="recent-list"></ul>
        <button id="export-csv" class="ghost">履歴をCSVで書き出し</button>
      </div>
    </section>

    <section id="quiz" class="card hidden">
      <div class="progress"><div id="progress-bar"></div></div>
      <h2 id="q-title"></h2>
      <p id="q-count" class="hint"></p>
      <div id="choices" class="choices"></div>
      <div class="actions">
        <button id="prev-btn" class="ghost">戻る</button>
      </div>
    </section>

    <section id="result" class="card hidden">
      <div id="result-stats"></div>
      <div id="result-content" style="margin-top:12px;"></div>
      <div id="prev-result" class="card hidden" style="margin-top:12px;background:#fff7fb;">
        <h3>前回の結果</h3>
        <div id="prev-result-content"></div>
      </div>
      <div class="share">
        <button id="share-btn" class="secondary">SNSでシェア</button>
        <button id="download-result" class="ghost">結果を保存（PNG）</button>
        <button id="restartBtn" class="ghost" onclick="showSection('home')">もう一度診断する</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">© MBWC</footer>

</body>
